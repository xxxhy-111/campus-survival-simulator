<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园生存模拟器 - 游戏二维码</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Microsoft YaHei', sans-serif;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 {
      color: #333;
      margin: 0 0 10px 0;
      font-size: 28px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .qrcode {
      margin: 20px 0;
    }
    .qrcode img {
      border: 8px solid #f0f0f0;
      border-radius: 10px;
    }
    .url {
      color: #667eea;
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
      word-break: break-all;
    }
    .instruction {
      color: #888;
      font-size: 14px;
      margin-top: 20px;
    }
    .footer {
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 校园生存模拟器</h1>
    <p class="subtitle">科技大学篇 · 计算机系新生的逆袭</p>
    
    <div class="qrcode">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=http://localhost:8000/" alt="游戏二维码">
    </div>
    
    <p class="url">http://localhost:8000/</p>
    <p class="instruction">📱 扫描二维码访问游戏</p>
  </div>
  
  <p class="footer">校园生存模拟器 v1.0</p>
</body>
</html>
